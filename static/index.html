<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anthropic Core Workflow RL Environment</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="panel" id="thread-list"></aside>
      <section class="panel detail">
        <header>
          <h1 id="thread-title">Loading...</h1>
          <p id="persona"></p>
        </header>
        <div id="messages" class="messages"></div>
        <label class="composer">
          <span>Draft reply</span>
          <textarea id="draft" rows="6"></textarea>
        </label>
        <div class="actions">
          <button id="save-draft">Save draft</button>
          <button id="send-reply">Send reply</button>
          <button id="reset-state" class="secondary">Reset state</button>
        </div>
      </section>
      <aside class="panel">
        <h2>Reward / Event Log</h2>
        <ul id="events" class="events"></ul>
      </aside>
    </main>
    <script src="app.js"></script>
  </body>
</html>
